<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy - STOCKOLON 26</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/buy.css') }}">
</head>
<body>
    <header class="buy-header">
        <a href="{{ url_for('main.index') }}" class="logo-link" aria-label="메인으로 이동">
            <img src="{{ url_for('static', filename='images/stockolon_logo.png') }}" id="logo" alt="STOCKOLON 26 Logo">
        </a>

        <nav id="header-nav" aria-label="상단 메뉴">
            <a href="{{ url_for('main.profile') }}" class="user-pill" aria-label="내 포트폴리오로 이동">
                <span class="user-avatar" aria-hidden="true"></span>
                <span class="user-name">세미님</span>
            </a>
            <a href="{{ url_for('main.rank') }}" class="nav-icon" aria-label="랭킹 페이지로 이동">
                <img src="{{ url_for('static', filename='images/ranking_icon.png') }}" alt="랭킹">
            </a>
            <a href="{{ url_for('main.settings') }}" class="nav-icon" aria-label="설정 페이지로 이동">
                <img src="{{ url_for('static', filename='images/settings_icon.png') }}" alt="설정">
            </a>
        </nav>
    </header>

    <main class="buy-page">
        <section class="asset-summary" aria-label="자산 요약">
            <article class="summary-card">
                <span class="summary-label">총 자산</span>
                <strong>12,300,000<span>원</span></strong>
            </article>
            <article class="summary-card">
                <span class="summary-label">총 매입금액</span>
                <strong>12,100,000<span>원</span></strong>
            </article>
            <article class="summary-card">
                <span class="summary-label">보유 현금</span>
                <strong>200,000<span>원</span></strong>
            </article>
        </section>

        <nav class="stock-category-filter" aria-label="종목 카테고리">
            <button class="category-btn active" type="button" data-category="all">전체</button>
            <button class="category-btn" type="button" data-category="0">공식</button>
            <button class="category-btn" type="button" data-category="1">수학</button>
            <button class="category-btn" type="button" data-category="2">물리/지구</button>
            <button class="category-btn" type="button" data-category="3">화학</button>
            <button class="category-btn" type="button" data-category="4">생명</button>
            <button class="category-btn" type="button" data-category="5">실험/공학</button>
            <button class="category-btn" type="button" data-category="6">정보</button>
            <button class="category-btn" type="button" data-category="7">문과</button>
            <button class="category-btn" type="button" data-category="8">기타</button>
        </nav>

        <section class="stock-grid" aria-label="주식 목록" data-image-base="{{ url_for('static', filename='images/') }}"></section>
    </main>

    <div class="trade-overlay" id="trade-modal" hidden>
        <section class="trade-modal" role="dialog" aria-modal="true" aria-labelledby="modal-stock-name">
            <div class="trade-tabs" role="tablist" aria-label="거래 종류">
                <button type="button" class="trade-tab active" data-mode="buy">매수</button>
                <button type="button" class="trade-tab" data-mode="sell">매도</button>
            </div>

            <button type="button" class="modal-close" aria-label="닫기">X</button>

            <div class="modal-stock">
                <img src="{{ url_for('static', filename='images/default_stock_logo.png') }}" alt="종목 로고" class="modal-logo">
                <div>
                    <h2 id="modal-stock-name">세미콜론</h2>
                    <p>정보</p>
                </div>
            </div>

            <div class="modal-price">
                <div>
                    <strong id="modal-price">12,345원</strong>
                    <span class="modal-change up">+400원 ( +4.14% )</span>
                </div>
                <dl class="modal-stats">
                    <div>
                        <dt>보유 수량 (주)</dt>
                        <dd>9</dd>
                    </div>
                    <div>
                        <dt>최고가</dt>
                        <dd>42,300</dd>
                    </div>
                    <div>
                        <dt>최저가</dt>
                        <dd>6,700</dd>
                    </div>
                </dl>
            </div>

            <svg class="modal-chart up-chart" viewBox="0 0 820 260" aria-hidden="true">
                <polyline points="18,230 60,190 92,220 128,160 160,190 198,135 224,205 270,170 318,100 348,145 382,95 420,210 452,150 486,178 530,130 572,190 616,160 650,115 690,170 720,120 752,170 782,95 806,60" />
            </svg>

            <form class="order-form">
                <label class="order-input-wrap">
                    <span>주문수량 (주)</span>
                    <input type="number" id="order-amount" min="0" value="0">
                </label>
                <button type="button" class="amount-btn" data-step="1">+</button>
                <button type="button" class="amount-btn" data-step="-1">−</button>

                <div class="shortcut-row">
                    <button type="button" class="shortcut-btn" data-value="10">10</button>
                    <button type="button" class="shortcut-btn" data-value="100">100</button>
                    <button type="button" class="shortcut-btn" data-value="max">최대</button>
                </div>

                <button type="submit" class="order-submit">
                    <span id="submit-count">0주</span>
                    <small id="submit-total">(0원)</small>
                    <strong id="submit-label">매수 주문하기</strong>
                </button>
            </form>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/clubinfo.js') }}"></script>
    <script src="{{ url_for('static', filename='js/buy.js') }}"></script>
</body>
</html>
