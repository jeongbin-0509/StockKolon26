<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCKOLON 26</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>

    <!-- 헤더 -->
    <header>
        <a href="{{ url_for('main.index') }}" class="logo-link" aria-label="메인으로 이동">
            <img src="{{ url_for('static', filename='images/stockolon_logo.png') }}" id="logo" alt="STOCKOLON 26 로고">
        </a>
        <nav id="header-nav">
            <a href="{{ url_for('main.rank') }}" id="ranking_btn" aria-label="랭킹 페이지로 이동">
                <img src="{{ url_for('static', filename='images/ranking_icon.png') }}" alt="랭킹">
            </a>
            <a href="{{ url_for('main.settings') }}" id="settings_btn" aria-label="설정 페이지로 이동">
                <img src="{{ url_for('static', filename='images/settings_icon.png') }}" alt="설정">
            </a>
        </nav>
    </header>

    <main>

        <!-- 프로필 섹션 -->
        <section id="profile-section">
            <div id="profile-img-wrap">
                <img src="{{ url_for('static', filename='images/profile.png') }}" id="profile-img" alt="프로필 이미지">
            </div>
            <div id="profile-text">
                <span class="sub_text">안녕하세요,</span>
                <span id="username" class="head1">세미 님👋</span>
            </div>
        </section>

        <!-- 내 포트폴리오 섹션 -->
        <a href="{{ url_for('main.profile') }}" id="portfolio-section" aria-label="내 포트폴리오 페이지로 이동">
            <div id="portfolio-header">
                <span class="sub_text">내 포트폴리오</span>
                <div id="portfolio-rate-wrap">
                    <span class="sub_text">오늘 수익률</span>
                    <span id="today-rate" class="head2 down">-123.2%</span>
                </div>
            </div>
            <div id="portfolio-body">
                <div id="portfolio-assets">
                    <span class="sub_text">총 자산</span>
                    <span id="total-assets" class="head1">12,300,000원</span>
                </div>
                <div id="portfolio-chart"></div>
            </div>
        </a>

        <!-- 상승/하락 주식 섹션 -->
        <section id="highlight-section">

            <!-- 최근 가장 많이 상승한 주식 -->
            <section class="highlight-card" id="top-up-card">
                <p class="sub_text highlight-label">
                    최근 5분간 보유 주식중 가장 많이 <span class="up">상승</span>한 주식
                </p>
                <div class="highlight-stock-info">
                    <div class="stock-info">
                        <img class="stock-logo" src="{{ url_for('static', filename='images/default_stock_logo.png') }}" alt="세미콜론 로고">
                        <div class="stock-name-wrap">
                            <span class="stock-name head3">세미콜론</span>
                            <span class="stock-sub sub_text">정보</span>
                        </div>
                    </div>
                    <span class="stock-change head2 up">+4.14% ↗</span>
                </div>
                <div class="stock-chart"></div>
            </section>

            <!-- 최근 가장 많이 하락한 주식 -->
            <section class="highlight-card" id="top-down-card">
                <p class="sub_text highlight-label">
                    최근 5분간 보유 주식중 가장 많이 <span class="down">하락</span>한 주식
                </p>
                <div class="highlight-stock-info">
                    <div class="stock-info">
                        <img class="stock-logo" src="{{ url_for('static', filename='images/default_stock_logo.png') }}" alt="세미콜론 로고">
                        <div class="stock-name-wrap">
                            <span class="stock-name head3">세미콜론</span>
                            <span class="stock-sub sub_text">정보</span>
                        </div>
                    </div>
                    <span class="stock-change head2 down">-4.14% ↘</span>
                </div>
                <div class="stock-chart"></div>
            </section>

        </section>

        <!-- 하단 링크 버튼 섹션 -->
        <section id="link-section">

            <a href="{{ url_for('main.buy') }}" class="link-card" id="buy-link">
                <img src="{{ url_for('static', filename='images/buy_icon.png') }}" alt="주식 구매 아이콘">
                <div class="link-text">
                    <span class="head2">주식 구매하기</span>
                    <span class="sub_text">원하는 동아리의 주식을 구매해보세요</span>
                </div>
            </a>

            <a href="{{ url_for('main.news') }}" class="link-card" id="news-link">
                <img src="{{ url_for('static', filename='images/news_icon.png') }}" alt="뉴스 아이콘">
                <div class="link-text">
                    <span class="head2">SEMI NEWS!</span>
                    <span class="sub_text">최신 시장 뉴스와 정보를 확인해보세요</span>
                </div>
            </a>

        </section>

    </main>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
