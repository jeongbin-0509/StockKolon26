<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - STOCKOLON 26</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
</head>
<body>

    <!-- 헤더 -->
    <header>
        <a href="{{ url_for('main.index') }}" class="logo-link" aria-label="메인으로 이동">
            <img src="{{ url_for('static', filename='images/stockolon_logo.png') }}" id="logo" alt="STOCKOLON 26 Logo" />
        </a>

        <nav id="header-nav">
            <!-- 유저 정보 -->
            <div class="user-info">
                <div class="user-avatar">
                    <span class="avatar-default-icon">&#9679;</span>
                </div>
                <span class="head2 user-name">세미님</span>
                <span class="user-rank">전체 1위</span>
            </div>
            <!-- 버튼 -->
            <a id="ranking_btn" href="{{ url_for('main.rank') }}">
                <img src="{{ url_for('static', filename='images/ranking_icon.png') }}" alt="랭킹">
            </a>
            <button id="logout_btn">로그아웃</button>
        </nav>
    </header>
    
    <main>
        <section id="latest-news">
            <div id="latest-good">
                <div id="latest-good-header">
                    <span class="head1">최근 호재</span>
                </div>
                <div id="latest-good-body">
                    <span class="head3">아싸리 반도체 업계가 레전드 돈을 벌고 있습니다.</span>
                </div>
            </div>

            <div id="latest-bad">
                <div id="latest-bad-header">
                    <span class="head1">최근 악재</span>
                </div>
                <div id="latest-bad-body">
                    <span class="head3">아싸리 반도체 업계의 거품이 무너지고 있습니다.</span>
                </div>
            </div>
        </section>

        <section id="news-list">
            <span class="head1">과거 뉴스 목록</span>
            
        </section>

    </main>
    <footer>

    </footer>
</body>
</html>
