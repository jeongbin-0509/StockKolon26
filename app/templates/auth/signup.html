<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - STOCKOLON 26</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='images/stockolon_logo.png')}}" id="logo"/>
        <button id="signup_btn">회원가입</button>
    </header>
    <main>
        <section class="signup-container">
        <form class="signup-box" action="/signup" method="POST">
            <h1 style="color: white;">회원가입</h1>
            <p style="color: white;">STOCKOLON 26 계정을 생성하세요</p>

            <label for="username" style="color: white;">이름</label>
            <input type="text" id="username" name="username" placeholder="이름 입력" required>

            <label for="email" style="color: white;">이메일</label>
            <input type="email" id="email" name="email" placeholder="이메일 입력" required>

            <label for="password" style="color: white;">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>

            <label for="password_check" style="color: white;">비밀번호 확인</label>
            <input type="password" id="password_check" name="password_check" placeholder="비밀번호 재입력" required>

            <button type="submit" class="signup-submit">회원가입</button>

            <div class="login-link" style="color: white;">
                이미 계정이 있나요? <a href="/login">로그인</a>
            </div>
        </form>
    </section>
    </main>
    <footer>

    </footer>
</body>
</html>
