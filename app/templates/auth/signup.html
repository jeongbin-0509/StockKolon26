<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up - STOCKOLON 26</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<header>
    <a href="{{ url_for('main.index') }}" class="logo-link" aria-label="메인으로 이동">
        <img src="{{ url_for('static', filename='images/stockolon_logo.png') }}" id="logo">
    </a>

    <div class="logo_text_wrap">
        <p class="school_text">운정고 동아리 모의주식투자 게임</p>
        <p class="by_text">by SemiColon26</p>
    </div>
</header>

<main>
    <form action="{{ url_for('auth.signup') }}" method="POST" id="signup_form">
        <input type="text" id="name" name="name" placeholder="이름" required>

        <input type="text" id="usernum" name="usernum" placeholder="학번" required>

        <div class="email_wrap">
            <input type="text" id="email_id" name="email_id" placeholder="학교 계정 입력" required>
            <span>@goedu.kr</span>
            <button type="button" id="send_code_btn">이메일 인증</button>
        </div>

        <input type="text" id="email_code" name="email_code" placeholder="인증번호 입력" required>

        <input type="password" id="password" name="password" placeholder="비밀번호" required minlength="6">

        <input type="password" id="password_check" name="password_check" placeholder="비밀번호 확인" required minlength="6">

        <div class="club_select_wrap">
            <p class="club_select_title">동아리 선택</p>

            <select id="club_id" name="club_id" required>
                <option value="">동아리를 선택하세요</option>
                <option value="01">온에어</option>
                <option value="02">아페토</option>

                <option value="11">수학에 복종</option>
                <option value="12">엡실론</option>
                <option value="13">매씨스트</option>
                <option value="14">유클리드</option>

                <option value="21">피지카스트로</option>
                <option value="22">뉴턴</option>
                <option value="23">그레이스</option>

                <option value="31">늘품</option>
                <option value="32">도담</option>
                <option value="33">폴리머</option>

                <option value="41">심쿵</option>
                <option value="42">하람</option>
                <option value="43">아스클레피오스</option>
                <option value="44">리사</option>
                <option value="45">티아</option>

                <option value="51">실험의 숲</option>
                <option value="52">에어로테크</option>
                <option value="53">메이키스</option>
                <option value="54">트리니티</option>
                <option value="55">Vortex</option>

                <option value="61">세미콜론</option>
                <option value="62">데이터무제한</option>

                <option value="71">빌리네어</option>
                <option value="72">모의유엔</option>
                <option value="73">테미스</option>
                <option value="74">디아리오</option>
                <option value="75">페이지오</option>
                <option value="76">아리솔</option>

                <option value="81">엘리제</option>
                <option value="82">에스쿱</option>
                <option value="83">소솜</option>
                <option value="84">라온제나</option>

                {% for club in clubs %}
                    <option value="{{ club.id }}">
                        {{ club.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" id="signup_btn">회원가입</button>
    </form>
</main>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <p class="flash_msg">{{ message }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}

<script src="{{ url_for('static', filename='js/signup.js') }}"></script>

</body>
</html>
